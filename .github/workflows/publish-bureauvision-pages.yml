name: Publish Bureauvision site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: bureauvision-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Package the Bureauvision site
        uses: actions/upload-pages-artifact@v3
        with:
          name: bureauvision-site-artifact
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the Bureauvision site
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: bureauvision-site-artifact
